---
- name: Create sync plans
  theforeman.foreman.sync_plan:
    organization: "{{ satellite_org }}"
    name: "{{ item.name }}"
    interval: "{{ item.interval }}"
    sync_date: "{{ item.sync_date }}"
    cron_expression: "{{ item.cron_expression | default(omit) }}"
    enabled: true
    state: present
  loop: "{{ satellite_sync_plans }}"
