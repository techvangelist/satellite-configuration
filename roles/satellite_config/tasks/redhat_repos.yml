---
- name: Enable Red Hat repository sets (x86_64)
  theforeman.foreman.repository_set:
    organization: "{{ satellite_org }}"
    name: "{{ item.name }}"
    product: "{{ item.product }}"
    state: enabled
    repositories:
      - releasever: "{{ item.releasever | default(omit) }}"
  loop: "{{ satellite_redhat_repos_x86_64 }}"
  loop_control:
    label: "{{ item.name }}"

- name: Enable Red Hat repository sets (aarch64)
  theforeman.foreman.repository_set:
    organization: "{{ satellite_org }}"
    name: "{{ item.name }}"
    product: "{{ item.product }}"
    state: enabled
    repositories:
      - releasever: "{{ item.releasever | default(omit) }}"
  loop: "{{ satellite_redhat_repos_aarch64 }}"
  loop_control:
    label: "{{ item.name }}"
